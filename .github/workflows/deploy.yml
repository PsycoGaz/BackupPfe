name: Deploy

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backuppfe/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backuppfe/frontend

jobs:
  check-status:
    name: Verify CI Status
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should-deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Check all CI workflows passed
        id: check
        run: echo "deploy=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: check-status
    if: needs.check-status.outputs.should-deploy == 'true'
    environment: production

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:latest
          docker pull ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy with Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d --force-recreate --no-build
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: 8h

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 10
          curl -f http://localhost:3000/api/health || echo "Backend health check skipped (no /health endpoint)"
          curl -f http://localhost:80 || echo "Frontend health check skipped"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed! Check the logs above."
