# Production compose file using pre-built GHCR images
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file with secrets

services:
  postgres:
    image: postgres:17-alpine
    container_name: hr-training-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hr-network

  backend:
    image: ghcr.io/psycogaz/backuppfe/backend:latest
    container_name: hr-training-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hr-network

  frontend:
    image: ghcr.io/psycogaz/backuppfe/frontend:latest
    container_name: hr-training-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hr-network

volumes:
  postgres_data:

networks:
  hr-network:
    driver: bridge
