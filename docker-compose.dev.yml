version: '3.8'

# Development override - mounts source for hot-reload
services:
  postgres:
    image: postgres:17-alpine
    container_name: hr-training-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2026
      POSTGRES_DB: hr_training
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hr-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: hr-training-backend-dev
    command: npm run start:dev
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 2026
      DB_NAME: hr_training
      JWT_SECRET: dev-secret-key
      JWT_EXPIRATION: 8h
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hr-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: hr-training-frontend-dev
    command: npm run dev -- --host
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - hr-network

volumes:
  postgres_dev_data:

networks:
  hr-network:
    driver: bridge
